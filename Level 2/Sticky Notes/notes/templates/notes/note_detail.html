{% extends "base.html" %}

{% block title %}{{ note.title }} - Sticky Notes{% endblock %}

{% block content %}
    <div class="note-detail">
        <!-- Display note title -->
        <h2>{{ note.title }}</h2>

        <!-- Display note content with preserved line breaks -->
        <div class="note-content">{{ note.content|linebreaks }}</div>

        <!-- Display formatted creation timestamp -->
        <p class="note-date"><i class="fas fa-calendar-alt"></i> Created: {{ note.created_at|date:"F j, Y, g:i a" }}</p>

        <!-- Action buttons for editing, deleting, or returning -->
        <div class="note_actions">
            <a href="{% url 'note_update' pk=note.pk %}" class="button edit-button">
                <i class="fas fa-edit"></i> Edit Note
            </a>
            <a href="{% url 'note_delete' pk=note.pk %}" class="button delete-button">
                <i class="fas fa-trash"></i> Delete Note
            </a>
            <a href="{% url 'note_list' %}" class="button back-button">
                <i class="fas fa-arrow-left"></i> Back to Notes
            </a>
        </div>
    </div>
{% endblock %}
