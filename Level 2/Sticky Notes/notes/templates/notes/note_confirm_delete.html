{% extends 'base.html' %}

{% block title %}Delete {{ note.title }} - Sticky Notes{% endblock %}

{% block content %}
    <div class="form-container">
        <!-- Page header with warning icon -->
        <h2><i class="fas fa-exclamation-triangle"></i> Delete Note</h2>

        <!-- Deletion warning message -->
        <div class="delete-warning">
            <h3>Are you sure you want to delete<br>"{{ note.title }}"?</h3>
            <p>This action cannot be undone. The note will be permanently removed.</p>
        </div>

        <!-- Confirmation form with CSRF protection -->
        <form method="post">
            {% csrf_token %}
            <div class="note_actions">
                <!-- Submit button to confirm deletion -->
                <button type="submit" class="button delete-button">
                    <i class="fas fa-trash"></i> Yes, Delete Note
                </button>

                <!-- Cancel button with JS fallback -->
                <button type="button" class="button cancel-button" onclick="goBack()">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </form>
    </div>

    <script>
        // Navigate back using browser history or fallback to note list page
        function goBack() {
            if (document.referrer) {
                window.history.back();
            } else {
                window.location.href = "{% url 'note_list' %}";
            }
        }
    </script>
{% endblock %}
